<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#08080b">
  <title>SentraGuard AI</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-root" id="appRoot">
    <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

    <section class="screen screen--landing" id="landingView"></section>

    <section class="screen screen--login is-hidden" id="loginView"></section>

    <section class="screen screen--platform is-hidden" id="platformView">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="sidebar-header">
          <button class="brand-lockup brand-lockup--sidebar" id="sidebarHomeButton" type="button">
            <span class="brand-mark brand-mark--violet" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                <path d="M12 3.2L17.9 5.4V10.7C17.9 14 15.4 17 12 18.2C8.6 17 6.1 14 6.1 10.7V5.4L12 3.2Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
                <path d="M12 6.6V14.6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
              </svg>
            </span>
            <span>
              <strong>SentraGuard</strong>
              <small>Insider Risk Command</small>
            </span>
          </button>
        </div>

        <div class="sidebar-scroll">
          <div class="sidebar-label">Workspace</div>

          <nav class="sidebar-nav" id="sidebarNav">
            <button class="nav-item" type="button" data-nav="overview">
              <span class="nav-icon nav-icon--overview" aria-hidden="true"></span>
              <span>Overview</span>
            </button>
            <button class="nav-item" type="button" data-nav="investigations">
              <span class="nav-icon nav-icon--investigations" aria-hidden="true"></span>
              <span>Investigations</span>
            </button>
            <button class="nav-item" type="button" data-nav="activity">
              <span class="nav-icon nav-icon--activity" aria-hidden="true"></span>
              <span>Activity</span>
            </button>
            <button class="nav-item" type="button" data-nav="operations">
              <span class="nav-icon nav-icon--operations" aria-hidden="true"></span>
              <span>Operations</span>
            </button>
            <button class="nav-item" type="button" data-nav="settings">
              <span class="nav-icon nav-icon--settings" aria-hidden="true"></span>
              <span>Settings</span>
            </button>
          </nav>

          <div class="sidebar-stack">
            <section class="sidebar-card runtime-card" id="runtimeCard"></section>
            <section class="sidebar-card admin-card" id="adminCard"></section>
          </div>
        </div>
      </aside>

      <div class="platform-stage">
        <header class="topbar">
          <label class="top-search" for="globalSearchInput">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
              <path d="M16 16L21 21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
            </svg>
            <input id="globalSearchInput" type="search" autocomplete="off" placeholder="Search employees, alerts...">
          </label>

          <div class="topbar-actions">
            <button class="icon-button" id="refreshButton" type="button" title="Refresh workspace">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 8V3M19 3H14M19 3L16 6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M5 16V21M5 21H10M5 21L8 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M18.3 12.7A7 7 0 0 0 7.1 6.6L5 8.5M18.9 15.5L16.9 17.4A7 7 0 0 1 5.7 11.3" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>

            <div class="status-chip" id="systemStatusChip">
              <span class="status-dot" aria-hidden="true"></span>
              <span id="systemStatusText">System Online</span>
            </div>

            <button class="icon-button alert-button" id="alertsButton" type="button" title="Jump to alerts">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7.5 17H16.5L15.6 15.5C15.1 14.7 14.9 13.9 14.9 13V10.7C14.9 8.7 13.5 6.9 11.6 6.5V6.1C11.6 5.4 12.1 4.9 12.8 4.9C13.5 4.9 14 5.4 14 6.1V6.4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M9.6 18.5C10 19.5 10.9 20.1 12 20.1C13.1 20.1 14 19.5 14.4 18.5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path>
              </svg>
              <span class="alert-count" id="alertCounter">0</span>
            </button>
          </div>
        </header>

        <main class="workspace">
          <section class="page-header" id="pageHeader"></section>
          <section class="page-content" id="pageContent"></section>
        </main>
      </div>
    </section>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
