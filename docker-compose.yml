version: "3.9"

services:
  sentraguard:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sentraguard
      POSTGRES_USER: sentraguard
      POSTGRES_PASSWORD: sentraguard
    ports:
      - "5432:5432"
    volumes:
      - sentraguard-postgres:/var/lib/postgresql/data

volumes:
  sentraguard-postgres:
